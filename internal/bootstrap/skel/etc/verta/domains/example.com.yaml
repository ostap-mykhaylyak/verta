# verta - one hosted domain
#
# Copy this file to <your-domain>.yaml in the same directory. The FILE
# NAME is the domain: verta refuses to load a file whose `name` key
# disagrees with it, so a typo cannot silently create a domain nobody
# meant to host.
#
# Apply changes with:  verta reload
# A file that fails to parse is logged and skipped: the other domains
# keep working.

name: example.com

# Shared disk quota for ALL this domain's mailboxes together ("10G",
# "2000M"; binary units, empty = unlimited). Each mailbox can also set
# its own quota below; both are enforced. A message that would overflow
# is deferred (452, "over quota"), never silently dropped.
# quota: 10G

# The DKIM key that signs this domain's outgoing mail. Create it with
#   verta generate-dkim example.com
# which prints the DNS TXT record to publish. A domain without a key
# simply sends unsigned.
dkim_selector: default

storage:
  # virtual     mailboxes are the users listed below
  # system_user the domain maps to one real Linux account
  type: virtual

  # For type: system_user, the whole domain belongs to one account:
  #
  #   type: system_user
  #   user: ostap
  #   home: /home/ostap          # optional, defaults to /home/<user>
  #   maildir: "{home}/mail"     # optional, {home} expands
  #   password_hash: "$argon2id$..."
  #
  # Mail for ostap@<domain> then lands in /home/ostap/mail with that
  # account's UID and GID.

# Virtual mailboxes. password_hash enables SMTP submission, IMAP and
# POP3 for the user; without one the mailbox can receive mail but
# nobody can log in to it.
#
# Generate a hash with:  verta hash-password
# Passwords are NEVER stored in clear, and the hash is never exposed
# by the administrative API.
users:
  - email: admin@example.com
    maildir: /var/mail/example.com/admin
    # password_hash: "$argon2id$v=19$m=65536,t=3,p=4$..."

    # This mailbox's own disk quota ("2G", "500M"; empty = unlimited).
    # It applies on top of the domain quota above.
    # quota: 2G

    # Forward a copy of every message to another address. A local copy is
    # kept by default; set keep_local: false to forward only. External
    # targets go out through SRS so they pass SPF at the destination.
    # forward_to: [backup@gmail.com]
    # keep_local: true

    # Delivery filters, evaluated in order. Conditions (from/to/subject/
    # header/larger_than) are ANDed; the first matching rule with
    # stop: true ends evaluation.
    # filters:
    #   - from: "newsletter@"
    #     folder: Newsletters
    #     stop: true
    #   - subject: "[URGENT]"
    #     flagged: true
    #   - from: spam@spammer.tld
    #     discard: true

  # - email: info@example.com
  #   maildir: /var/mail/example.com/info
  #   password_hash: "$argon2id$..."

# Aliases: a local part maps to one or more targets. A target may be a
# local mailbox (delivery), several (a distribution list), or an external
# address (a forward, sent through SRS).
# aliases:
#   info: admin@example.com
#   sales: [admin@example.com, info@example.com]
#   webmaster: someone@external.com

# Catch-all: any address in this domain that matches neither a mailbox
# nor an alias lands here. Leave unset to reject unknown addresses.
# catch_all: admin@example.com

# Outbound policy for this whole domain (each mailbox can override its
# own below). egress_ip pins the source IP (must be one of the
# egress.addresses in config.yaml); rate caps the domain's sending;
# throttle paces it per destination.
# outbound:
#   egress_ip: 203.0.113.10
#   rate:
#     messages_per_hour: 1000
#     recipients_per_hour: 5000
#   throttle:
#     - to: gmail.com
#       interval: 5s          # one message to Gmail every 5 seconds
#
# Per-mailbox override (on a user entry above):
#   - email: bulk@example.com
#     maildir: /var/mail/example.com/bulk
#     outbound:
#       egress_ip: 203.0.113.11
#       rate: { messages_per_hour: 20000 }
#       throttle:
#         - to: "*"
#           messages: 100
#           window: 1m
